<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141E30,#243B55);
}

.calculator{
    width:340px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    text-align:right;
    font-size:2rem;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.15);
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:15px;
    font-size:1.3rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

.num{
    background:#ffffff;
}

.operator{
    background:#00c9a7;
    color:white;
}

.equal{
    background:#ff6b6b;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#ffb703;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="operator" onclick="append('.')">.</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="num" onclick="append('0')">0</button>

        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

document.addEventListener("keydown", (e)=>{
    if("0123456789+-*/.".includes(e.key)){
        display.value += e.key;
    }
    else if(e.key === "Enter"){
        calculate();
    }
    else if(e.key === "Backspace"){
        display.value = display.value.slice(0,-1);
    }
    else if(e.key === "Escape"){
        clearDisplay();
    }
});
</script>

</body>
</html>
